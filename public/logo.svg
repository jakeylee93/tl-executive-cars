<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Outer ring gradient (silver/chrome) -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="30%" stop-color="#c0c0c0"/>
      <stop offset="50%" stop-color="#d8d8d8"/>
      <stop offset="70%" stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#c8c8c8"/>
    </linearGradient>
    
    <!-- Inner circle gradient (dark grey, lighter at top) -->
    <radialGradient id="innerGrad" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#707070"/>
      <stop offset="50%" stop-color="#555555"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </radialGradient>
    
    <!-- Banner gradient (silver ribbon) -->
    <linearGradient id="bannerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8c8c8"/>
      <stop offset="25%" stop-color="#b0b0b0"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="75%" stop-color="#a8a8a8"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>

    <!-- Drop shadow for depth -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.3"/>
    </filter>

    <!-- Curved text paths -->
    <path id="topCurve" d="M 120,250 A 130,130 0 0,1 380,250" fill="none"/>
    <path id="bottomCurve" d="M 135,270 A 125,125 0 0,0 365,270" fill="none"/>
  </defs>

  <!-- Outer silver ring -->
  <circle cx="250" cy="250" r="240" fill="url(#ringGrad)" filter="url(#shadow)"/>
  
  <!-- Inner dark circle -->
  <circle cx="250" cy="250" r="218" fill="url(#innerGrad)"/>
  
  <!-- Subtle inner border -->
  <circle cx="250" cy="250" r="218" fill="none" stroke="#4a4a4a" stroke-width="1" opacity="0.5"/>

  <!-- "THEYDON" curved along top -->
  <text font-family="'Garamond', 'Cormorant Garamond', 'Times New Roman', serif" font-size="52" fill="#c8c8c8" letter-spacing="8">
    <textPath href="#topCurve" startOffset="50%" text-anchor="middle">THEYDON</textPath>
  </text>

  <!-- Silver banner/ribbon across middle -->
  <rect x="60" y="232" width="380" height="46" rx="2" fill="url(#bannerGrad)"/>
  <!-- Banner top highlight -->
  <line x1="60" y1="233" x2="440" y2="233" stroke="#d5d5d5" stroke-width="1" opacity="0.6"/>
  <!-- Banner bottom shadow -->
  <line x1="60" y1="277" x2="440" y2="277" stroke="#888" stroke-width="1" opacity="0.4"/>

  <!-- "EXECUTIVE CARS" on banner -->
  <text x="250" y="264" font-family="'Garamond', 'Cormorant Garamond', 'Times New Roman', serif" font-size="38" fill="#4a4a4a" text-anchor="middle" letter-spacing="5">EXECUTIVE CARS</text>

  <!-- "LOUGHTON" curved along bottom -->
  <text font-family="'Garamond', 'Cormorant Garamond', 'Times New Roman', serif" font-size="50" fill="#4a4a4a" letter-spacing="6">
    <textPath href="#bottomCurve" startOffset="50%" text-anchor="middle">LOUGHTON</textPath>
  </text>
</svg>
